<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Intelligence Dashboard</title>
  <style>

    :root{
      --bg:#07101f;
      --bg2:#0b1428;
      --panel:rgba(14,24,48,.88);
      --panel2:rgba(18,30,58,.92);
      --panel3:rgba(24,37,70,.92);
      --line:rgba(255,255,255,.10);
      --line-strong:rgba(255,255,255,.16);
      --text:#f4f7ff;
      --muted:#a8b4cf;
      --accent:#8b5cf6;
      --accent2:#22c55e;
      --accent3:#38bdf8;
      --warn:#f59e0b;
      --danger:#fb7185;
      --chip:rgba(139,92,246,.12);
      --chip-strong:rgba(139,92,246,.22);
      --shadow:0 24px 80px rgba(0,0,0,.36);
      --shadow-soft:0 12px 30px rgba(0,0,0,.20);
      --radius:22px;
      --radius-sm:14px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      color:var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      background:
        radial-gradient(1200px 600px at 15% 0%, rgba(139,92,246,.18), transparent 50%),
        radial-gradient(900px 500px at 85% 10%, rgba(56,189,248,.12), transparent 45%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      letter-spacing:.01em;
    }
    a{color:inherit;text-decoration:none}
    button,input,select,textarea{
      font:inherit;
    }
    button{
      -webkit-appearance:none;
      appearance:none;
    }
    ::selection{
      background:rgba(139,92,246,.35);
      color:#fff;
    }

    .app{
      min-height:100%;
      padding:18px;
    }
    .layout{
      max-width:1600px;
      margin:0 auto;
      display:grid;
      grid-template-columns: 320px minmax(0,1fr);
      gap:18px;
      align-items:start;
    }

    .sidebar,
    .panel,
    .acct-card,
    .meta-card,
    .signal-box,
    .strategy-box,
    .news-card,
    .mention-card,
    .exec,
    .drawer-card{
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-soft);
      border:1px solid var(--line);
    }

    .sidebar{
      position:sticky;
      top:18px;
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(16,26,51,.95), rgba(10,16,32,.88));
      padding:18px;
      overflow:hidden;
    }

    .sidebar-head{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-bottom:14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .brand-mark{
      width:40px;height:40px;border-radius:14px;
      display:grid;place-items:center;
      font-weight:800;
      background:linear-gradient(135deg, var(--accent), var(--accent3));
      color:#fff;
      box-shadow:0 14px 30px rgba(139,92,246,.25);
      flex:0 0 auto;
    }
    .brand .kicker{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:var(--muted);
      margin-bottom:4px;
    }
    .brand .sub{
      color:var(--muted);
      font-size:12px;
      line-height:1.35;
    }

    .search{
      width:100%;
      padding:12px 13px;
      border-radius:14px;
      border:1px solid var(--line);
      outline:none;
      background:rgba(255,255,255,.04);
      color:var(--text);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
    }
    .search:focus{
      border-color:rgba(139,92,246,.58);
      box-shadow:0 0 0 3px rgba(139,92,246,.12);
    }

    .acct-list{
      margin-top:14px;
      max-height:calc(100vh - 220px);
      overflow:auto;
      padding-right:4px;
    }
    .acct-list::-webkit-scrollbar,
    .drawer-content::-webkit-scrollbar,
    .results-table-wrap::-webkit-scrollbar{
      width:10px;
      height:10px;
    }
    .acct-list::-webkit-scrollbar-thumb,
    .drawer-content::-webkit-scrollbar-thumb,
    .results-table-wrap::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.14);
      border-radius:999px;
      border:2px solid transparent;
      background-clip:content-box;
    }
    .acct-card{
      border-radius:18px;
      padding:14px;
      margin-bottom:10px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      cursor:pointer;
      transition:transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
      color:var(--text) !important;
    }
    .acct-card:hover{
      transform:translateY(-1px);
      border-color:rgba(139,92,246,.34);
      box-shadow:0 18px 40px rgba(0,0,0,.22);
    }
    .acct-card.active{
      background:linear-gradient(180deg, rgba(139,92,246,.18), rgba(56,189,248,.08));
      border-color:rgba(139,92,246,.45);
      box-shadow:0 18px 40px rgba(0,0,0,.22);
    }
    .acct-card .name{
      font-weight:700;
      font-size:14px;
      line-height:1.35;
      margin-bottom:5px;
      color:var(--text) !important;
    }
    .acct-card .sub{
      color:var(--muted) !important;
      font-size:12px;
      line-height:1.45;
    }

    .main{
      display:flex;
      flex-direction:column;
      gap:18px;
      min-width:0;
    }

    .topbar{
      position:sticky;
      top:18px;
      z-index:5;
    }
    .topbar-inner{
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(16,26,51,.92), rgba(13,20,39,.88));
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
      padding:18px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }
    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .panel{
      border-radius:var(--radius);
      background:linear-gradient(180deg, var(--panel), rgba(10,16,32,.82));
      padding:18px;
      min-width:0;
    }
    .panel.hero{
      padding:22px;
    }
    .hero{
      display:grid;
      grid-template-columns:minmax(0,1.3fr) minmax(320px,.9fr);
      gap:18px;
      align-items:start;
    }
    .hero-left{min-width:0}
    .hero-right{min-width:0}

    .brandTag,
    .pill,
    .score,
    .badge,
    .mini,
    .chip,
    .tag,
    .recipe-chip,
    .match-chip,
    .action,
    .btn,
    .tabbtn{
      transition:transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease, color .18s ease, opacity .18s ease;
    }

    .brandTag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(139,92,246,.12);
      color:#d9ccff;
      border:1px solid rgba(139,92,246,.18);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      margin-bottom:14px;
    }
    .hero-title{
      font-size:28px;
      line-height:1.1;
      letter-spacing:-.03em;
      font-weight:800;
      margin:0 0 8px 0;
      color:#fff;
    }
    .selected-brand{
      color:var(--muted);
      margin-bottom:16px;
      font-size:14px;
      line-height:1.5;
    }

    .summaryGrid,
    .summary-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:12px;
    }
    .meta-card{
      border-radius:18px;
      padding:14px 15px;
      background:rgba(255,255,255,.04);
      color:var(--text) !important;
    }
    .label{
      text-transform:uppercase;
      letter-spacing:.12em;
      font-size:11px;
      color:#aab6d8;
      margin-bottom:8px;
    }
    .value{
      font-size:15px;
      line-height:1.45;
      font-weight:700;
      color:#fff;
    }

    .hero-right{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .signal-box{
      border-radius:20px;
      background:rgba(255,255,255,.035);
      padding:15px;
      color:var(--text) !important;
    }
    .signal-box .head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .signal-list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .signal{
      padding:10px 11px;
      border-radius:14px;
      background:rgba(255,255,255,.03);
      border:1px solid transparent;
      color:var(--text);
      line-height:1.4;
    }
    .score{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 11px;
      border-radius:999px;
      background:rgba(34,197,94,.12);
      border:1px solid rgba(34,197,94,.22);
      color:#d9ffe7;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }
    #intelNarrative,#salesAngle{
      color:var(--text) !important;
      line-height:1.6;
    }

    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .tabbtn{
      border:1px solid var(--line);
      background:rgba(255,255,255,.035);
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:650;
      letter-spacing:.01em;
    }
    .tabbtn:hover{
      transform:translateY(-1px);
      border-color:rgba(139,92,246,.35);
      background:rgba(139,92,246,.10);
    }
    .tabbtn.active{
      background:linear-gradient(135deg, rgba(139,92,246,.24), rgba(56,189,248,.14));
      border-color:rgba(139,92,246,.42);
      box-shadow:0 12px 30px rgba(139,92,246,.15);
    }

    .section-title{
      font-size:22px;
      line-height:1.2;
      letter-spacing:-.02em;
      font-weight:800;
      margin-bottom:6px;
      color:#fff;
    }
    .section-sub,
    .small-note,
    .query-note,
    .meta,
    .desc,
    .why,
    .sub{
      color:var(--muted) !important;
      line-height:1.55;
    }
    .section-sub{font-size:14px}
    .small-note{font-size:13px}
    .query-note{
      margin-top:8px;
      padding:12px 13px;
      border-radius:14px;
      background:rgba(255,255,255,.035);
      border:1px solid var(--line);
      color:#d7def2 !important;
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .left,.right{min-width:0}
    .tagrow{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .tag,
    .mini,
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:7px 10px;
      font-size:12px;
      line-height:1;
    }
    .tag{
      cursor:pointer;
    }
    .tag:hover{
      transform:translateY(-1px);
      border-color:rgba(245,158,11,.55);
      background:rgba(245,158,11,.10);
    }
    .pill:hover{
      transform:translateY(-1px);
      border-color:rgba(139,92,246,.36);
    }
    .mini{
      font-size:11px;
      color:#dbe4ff;
      background:rgba(139,92,246,.08);
      border-color:rgba(139,92,246,.16);
    }

    .news-grid,
    .mentions-grid,
    .exec-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
    }
    .news-card,
    .mention-card,
    .exec{
      border-radius:20px;
      padding:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      color:var(--text) !important;
    }
    .exec .top,
    .news-card .top,
    .mention-card .top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:10px;
    }
    .title,
    .name{
      color:#fff !important;
      font-weight:800;
      line-height:1.35;
    }
    .title{font-size:15px}
    .name{font-size:16px}
    .date{
      font-size:12px;
      color:var(--muted);
      flex:0 0 auto;
      white-space:nowrap;
    }
    .desc,
    .why{
      margin-top:6px;
      font-size:13px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:7px 10px;
      background:rgba(56,189,248,.12);
      border:1px solid rgba(56,189,248,.18);
      color:#d6f3ff;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .mini-row,
    .actions,
    .row,
    .cta-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      margin-top:12px;
    }
    .actions{justify-content:flex-start}

    .btn,
    .action{
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:11px 13px;
      cursor:pointer;
      font-weight:700;
      line-height:1;
      text-align:center;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .btn:hover,
    .action:hover{
      transform:translateY(-1px);
      border-color:rgba(139,92,246,.32);
      background:rgba(139,92,246,.08);
    }
    .btn.primary,
    .action.primary{
      background:linear-gradient(135deg, rgba(139,92,246,.95), rgba(56,189,248,.82));
      color:#fff;
      border-color:transparent;
      box-shadow:0 14px 30px rgba(139,92,246,.22);
    }
    .btn.primary:hover,
    .action.primary:hover{
      transform:translateY(-1px);
      filter:saturate(1.06);
    }
    .btn.ghost{
      background:rgba(255,255,255,.03);
    }

    .podcast-controls{
      display:grid;
      grid-template-columns:2fr 1fr 1fr;
      gap:10px;
    }
    .podcast-controls input,
    .podcast-controls select{
      width:100%;
      padding:12px 13px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      outline:none;
    }
    .podcast-controls input::placeholder,
    .search::placeholder{
      color:#7f8bad;
    }
    .podcast-controls input:focus{
      border-color:rgba(139,92,246,.58);
      box-shadow:0 0 0 3px rgba(139,92,246,.1);
    }

    .advanced{
      margin-top:12px;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.03);
      overflow:hidden;
    }
    .advanced summary{
      cursor:pointer;
      list-style:none;
      padding:14px 16px;
      color:#fff;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .advanced summary::-webkit-details-marker{display:none}
    .advanced-body{
      padding:0 16px 16px;
    }

    .toggle-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
    }
    .toggle{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:var(--text);
      font-size:12px;
    }
    .toggle input{accent-color:var(--accent)}
    .strategy-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }
    .strategy-box{
      border-radius:18px;
      padding:15px;
      background:rgba(255,255,255,.04);
      color:var(--text) !important;
    }
    .strategy-box .meta{
      margin-top:10px;
      font-size:13px;
    }
    .strategy-chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .match-chip,
    .recipe-chip{
      border-radius:999px;
      border:1px solid rgba(245,158,11,.28);
      background:linear-gradient(180deg, rgba(245,158,11,.96), rgba(251,191,36,.92));
      color:#1a1200;
      padding:9px 12px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }
    .match-chip:hover,
    .recipe-chip:hover{
      transform:translateY(-1px);
      box-shadow:0 12px 26px rgba(245,158,11,.12);
    }
    .recipe-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:14px;
    }

    .results{
      margin-top:14px;
      border-radius:20px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      padding:16px;
      color:var(--text) !important;
    }
    .results-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .empty{
      margin-top:14px;
      padding:14px 15px;
      border-radius:16px;
      background:rgba(255,255,255,.03);
      border:1px dashed rgba(255,255,255,.12);
      color:var(--muted);
      line-height:1.55;
    }

    .panel.content{
      min-height:220px;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }

    .drawer-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.44);
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease;
      z-index:30;
    }
    .drawer-backdrop.open{
      opacity:1;
      pointer-events:auto;
    }
    .drawer{
      position:fixed;
      top:18px;
      right:18px;
      width:min(900px, calc(100vw - 36px));
      height:calc(100vh - 36px);
      border-radius:24px;
      background:linear-gradient(180deg, rgba(13,21,41,.98), rgba(8,13,25,.96));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      transform:translateX(106%);
      transition:transform .24s ease;
      z-index:40;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      color:var(--text) !important;
    }
    .drawer.open{transform:translateX(0)}
    .drawer-header{
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      background:rgba(255,255,255,.02);
    }
    .drawer-header h3{
      margin:0;
      color:#fff;
      font-size:18px;
    }
    .drawer-content{
      padding:18px;
      overflow:auto;
    }
    .drawer-card{
      border-radius:20px;
      padding:16px;
      margin-bottom:14px;
      background:rgba(255,255,255,.04);
      color:var(--text) !important;
    }

    .results-table-wrap{
      overflow:auto;
      border-radius:16px;
      border:1px solid var(--line);
      margin-top:12px;
      background:rgba(255,255,255,.02);
    }
    table{
      width:100%;
      border-collapse:collapse;
      min-width:760px;
      color:var(--text);
    }
    thead th{
      position:sticky;
      top:0;
      z-index:1;
      background:rgba(17,27,51,.98);
      color:#eaf0ff;
      text-align:left;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.10em;
      padding:12px 13px;
      border-bottom:1px solid var(--line);
    }
    tbody td{
      padding:12px 13px;
      border-bottom:1px solid rgba(255,255,255,.06);
      vertical-align:top;
      color:var(--text);
      font-size:13px;
      line-height:1.5;
    }
    tbody tr:hover{
      background:rgba(255,255,255,.03);
    }

    .drawer-close{
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:#fff;
      width:38px;height:38px;
      border-radius:12px;
      cursor:pointer;
      font-size:22px;
      line-height:1;
    }

    .big{
      color:#fff;
      font-weight:800;
    }

    @media (max-width: 1320px){
      .layout{grid-template-columns:1fr}
      .sidebar{position:relative;top:0}
      .hero{grid-template-columns:1fr}
      .summaryGrid,.meta-grid,.strategy-grid,.news-grid,.mentions-grid,.exec-grid{grid-template-columns:repeat(2, minmax(0,1fr))}
      .drawer{width:min(820px, calc(100vw - 24px)); right:12px; top:12px; height:calc(100vh - 24px);}
    }
    @media (max-width: 860px){
      .app{padding:12px}
      .topbar-inner{flex-direction:column; align-items:stretch}
      .top-actions{justify-content:flex-start}
      .summaryGrid,.meta-grid,.strategy-grid,.news-grid,.mentions-grid,.exec-grid{grid-template-columns:1fr}
      .podcast-controls{grid-template-columns:1fr}

function esc(s){
  return String(s ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}
function clean(s){ return String(s ?? '').trim(); }
function slugify(s){
  return clean(s).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim().replace(/\s+/g,'-');
}
function normalize(s){
  return clean(s).toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim();
}
function formatDate(value){
  if(!value) return '—';
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return value;
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
}
function safeUrl(url){
  try { return new URL(url).toString(); } catch { return '#'; }
}
function googleSearchUrl(query){ return `https://www.google.com/search?q=${encodeURIComponent(query)}`; }
function youtubeSearchUrl(query){ return `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`; }
function spotifySearchUrl(query){ return `https://open.spotify.com/search/${encodeURIComponent(query)}`; }

}
function hashState(){
  const a = selectedAccount();
  const params = new URLSearchParams();
  params.set('acct', String(state.selectedIndex));

  return `#${params.toString()}`;
}
function applyHash(){
  const hash = location.hash.startsWith('#') ? location.hash.slice(1) : '';
  if(!hash) return;
  const params = new URLSearchParams(hash);
  const acct = parseInt(params.get('acct') || '', 10);
  const tab = params.get('tab');
  const q = params.get('q');
  if(Number.isFinite(acct) && acct >= 0 && acct < accounts.length) state.selectedIndex = acct;
  if(tab && tabs.some(t => t.id === tab)) state.activeTab = tab;
  if(q) state.podcastQuery = q;
}
function persist(){
  const payload = {
    selectedIndex: state.selectedIndex,
    activeTab: state.activeTab,
    filter: state.filter,
    podcastQuery: state.podcastQuery,
    googleKey: state.googleKey,
    googleCx: state.googleCx,
    youtubeKey: state.youtubeKey,
    sourceFilters: state.sourceFilters
  };
  localStorage.setItem(LS_KEY, JSON.stringify(payload));
  history.replaceState(null, '', hashState());
}
function restore(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const saved = JSON.parse(raw);
      Object.assign(state, saved);
      state.sourceFilters = Object.assign(state.sourceFilters, saved.sourceFilters || {});
    }
  }catch{}
  applyHash();
}
function selectedAccount(){
  return accounts[state.selectedIndex] || accounts[0];
}

function roleScore(title){
  const t = normalize(title);
  const rules = [
    [/chief executive officer|ceo|president and chief executive officer/, 100],
    [/president|gm|general manager|chief operating officer|coo/, 92],
    [/chief financial officer|cfo|svp finance|finance/, 90],
    [/chief revenue officer|cro|sales|go to market|gtm/, 88],
    [/chief marketing officer|cmo|marketing/, 84],
    [/chief technology officer|cto|chief information officer|cio|engineering|product|platform/, 80],
    [/chief security officer|security|privacy|risk/, 78],
    [/vp|vice president|director/, 70]
  ];
  for(const [re, score] of rules){
    if(re.test(t)) return score;
  }
  return 62;
}
function personaForTitle(title){
  const t = normalize(title);
  if(/chief executive officer|ceo|president and chief executive officer/.test(t)) return 'Decision maker';
  if(/chief financial officer|cfo|finance/.test(t)) return 'Budget owner';
  if(/chief revenue officer|sales|go to market|gtm|marketing/.test(t)) return 'Demand owner';
  if(/chief technology officer|cto|chief information officer|cio|engineering|platform|product/.test(t)) return 'Technical buyer';
  if(/security|privacy|risk/.test(t)) return 'Control owner';
  if(/president|general manager/.test(t)) return 'Business owner';
  return 'Influencer';
}
function execWhy(exec, account){
  const text = `${exec.title} ${account.news.map(n=>n.summary).join(' ')} ${account.mentions.map(m=>m.summary).join(' ')}`.toLowerCase();
  const themes = [];
  if(/ai|artificial intelligence|machine learning/.test(text)) themes.push('AI / automation');
  if(/security|breach|privacy|risk/.test(text)) themes.push('security / compliance');
  if(/growth|expand|expansion|new market|launch/.test(text)) themes.push('growth / expansion');
  if(/guidance|earnings|revenue|margin|profit/.test(text)) themes.push('financial pressure');
  if(/hiring|appoint|named|leadership/.test(text)) themes.push('leadership change');
  if(!themes.length) themes.push('account relevance');
  return `${personaForTitle(exec.title)}; signals: ${themes.slice(0,2).join(', ')}.`;
}
function rankExecs(account){
  return (account.execs || [])
    .map(e => ({
      ...e,
      score: roleScore(e.title) + (normalize(e.name).includes(normalize(account.account)) ? 2 : 0),
      persona: personaForTitle(e.title),
      why: execWhy(e, account)
    }))
    .sort((a,b) => b.score - a.score);
}
function recentThemes(account){
  const words = new Map();
  const src = [...(account.news||[]), ...(account.mentions||[])].map(x => `${x.title} ${x.summary}`).join(' ').toLowerCase();
  const themeMap = {
    'ai': ['ai','artificial intelligence','machine learning','automation'],
    'security': ['security','breach','privacy','compliance','risk'],
    'growth': ['growth','expansion','launch','new product','platform'],
    'guidance': ['guidance','earnings','revenue','margin','profit','forecast'],
    'hiring': ['hiring','appointed','names','named','leadership'],
    'partnerships': ['partnership','integration','collaboration','channel'],
    'product': ['product','feature','solution','capabilities','innovation']
  };
  for(const [label, terms] of Object.entries(themeMap)){
    if(terms.some(t => src.includes(t))) words.set(label, (words.get(label)||0)+1);
  }
  if(!words.size) ['growth','product','leadership'].forEach(k => words.set(k,1));
  return [...words.keys()].slice(0,6);
}
function buildHashtags(account){
  const out = [];
  const names = [account.account, account.finance_name, ...(account.execs||[]).map(e=>e.name)];
  names.forEach(n => {
    const slug = slugify(n).replace(/-/g,'');
    if(slug) out.push(`#${slug}`);
  });
  recentThemes(account).forEach(t => out.push(`#${t}`));
  return [...new Set(out)].slice(0,10);
}
function accountScore(account){
  const execs = rankExecs(account);
  const themes = recentThemes(account).length;
  const mentions = (account.mentions || []).length;
  const news = (account.news || []).length;
  return Math.min(100, Math.round(48 + execs[0].score/2 + themes*5 + mentions*2 + news*2));
}
function recommendedAngle(account){
  const themes = recentThemes(account);
  if(themes.includes('security')) return 'Lead with risk reduction, compliance, and trust messaging.';
  if(themes.includes('guidance')) return 'Lead with performance, efficiency, and pipeline certainty.';
  if(themes.includes('ai')) return 'Lead with AI enablement, automation, and operational leverage.';
  if(themes.includes('growth')) return 'Lead with scale, expansion, and faster execution.';
  return 'Lead with business outcomes tied to the current platform and growth motion.';
}

  pushPack('YouTube', 'Podcast/video search', `"${company}" podcast interview OR webinar OR earnings`, 'Best source for interviews, earnings clips, and speaking appearances.', 'youtube');
  pushPack('YouTube', 'Executive video search', `${execs.join(' OR ')} "${company}"`, 'Finds exec appearances, panels, and interview clips.', 'youtube');
  pushPack('Spotify', 'Spotify pages', `site:open.spotify.com OR site:spotify.com "${company}" podcast`, 'Finds Spotify-indexed shows and episode pages via web indexing.', 'spotify');
  pushPack('Spotify', 'Spotify + execs', `site:open.spotify.com OR site:spotify.com ${execs.join(' OR ')} "${company}"`, 'Targets audio mentions and guest appearances tied to execs.', 'spotify');
  pushPack('Google', 'LinkedIn posts', `site:linkedin.com/posts OR site:linkedin.com/feed "${company}" ${themes[0] || ''}`.trim(), 'Useful for recent company announcements and executive posts.', 'social');
  pushPack('Google', 'X / social sweep', `site:x.com OR site:twitter.com "${company}" ${themes[0] || ''} ${hashtags[0] || ''}`.trim(), 'Surfaces social buzz, reposts, and hashtag chatter.', 'social');
  pushPack('Google', 'Reddit sweep', `site:reddit.com "${company}" OR "${finance}"`, 'Finds organic discussion and product commentary.', 'social');

      renderTabs();
    });
  });
}
function renderTabContent(){
  const account = selectedAccount();
  const titleMap = {
    executives: ['Executives', 'Target the right people fast.', 'Who to target first, by role and influence.'],
    news: ['Recent news', 'Latest announcements and the story behind them.', 'Use these as trigger events and outreach hooks.'],
    mentions: ['Public mentions', 'Web/social mention trails and where to look next.', 'Cross-channel mention hunting for sales prospecting.'],
    podcasts: ['Podcasts + web mentions', 'Deep search across Google, YouTube, Spotify-indexed pages, and social hashtags.', 'Click any chip to launch a search pack and see ranked results.']
  };
  const t = titleMap[state.activeTab];
  el.tabContent.innerHTML = `
    <div>
      <div class="section-title">${esc(t[0])}</div>
      <div class="section-sub">${esc(t[1])}</div>
      <div class="section-sub">${esc(t[2])}</div>
    </div>
    ${state.activeTab==='executives' ? renderExecutives(account) : ''}
    ${state.activeTab==='news' ? renderNews(account) : ''}
    ${state.activeTab==='mentions' ? renderMentions(account) : ''}
    ${state.activeTab==='podcasts' ? renderPodcasts(account) : ''}
  `;
  bindTabActions(account);
}
function renderExecutives(account){
  const execs = rankExecs(account);
  return `
    <div class="toolbar">

        <button class="chip active" data-exec-filter="all">All executives</button>

    </div>
    <div class="exec-grid" id="execGrid">

        <div class="exec" data-persona="${esc(e.persona.toLowerCase())}">
          <div class="top">

          <div class="actions">
            <button class="action primary" data-open="google-exec" data-name="${esc(e.name)}">Google search</button>
            <button class="action" data-open="youtube-exec" data-name="${esc(e.name)}">YouTube search</button>
            <button class="action" data-open="linkedin-exec" data-name="${esc(e.name)}">LinkedIn search</button>
            <a class="action" href="${esc(safeUrl(e.url || googleSearchUrl(`"${e.name}" "${account.account}"`)))}" target="_blank" rel="noopener noreferrer">Open source</a>

}
function renderNews(account){
  const themes = recentThemes(account);
  return `
    <div class="toolbar">
      <div class="left tagrow">
        ${themes.map(t => `<span class="tag" data-theme="${esc(t)}">${esc(t)}</span>`).join('')}

function renderMentions(account){

    <div class="toolbar">

        ${hashtags.map(t => `<button class="tag" data-hashtag="${esc(t)}">${esc(t)}</button>`).join('')}

      ${(account.mentions || []).map((m, idx) => `

          </div>
          <div class="actions">
            <a class="action primary" href="${esc(safeUrl(m.url))}" target="_blank" rel="noopener noreferrer">Open mention</a>
            <button class="action" data-open="mention-search" data-query="${esc(m.title + ' ' + account.account)}">Deep search</button>
          </div>
        </div>
      `).join('')}

  `;
}
function renderPodcasts(account){
  const query = state.podcastQuery || account.account;
  const execs = rankExecs(account).slice(0,4);
  const hashtags = buildHashtags(account);
  const themes = recentThemes(account);
  return `
    <div class="podcast-controls">
      <input id="podcastQuery" type="text" placeholder="Search company, executive, hashtag, or theme" value="${esc(query)}" />
      <input id="googleKey" type="password" placeholder="Google API key (optional)" value="${esc(state.googleKey)}" />

    </div>

    <details class="advanced">

      <div class="advanced-body">
        <div class="podcast-controls" style="margin-top:10px;">
          <input id="youtubeKey" type="password" placeholder="YouTube API key (optional)" value="${esc(state.youtubeKey)}" />
          <button class="btn primary" id="runPodcastSearch" type="button">Run deep search</button>
          <button class="btn ghost" id="savePodcastKeys" type="button">Save settings</button>
        </div>
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="useWeb" ${state.sourceFilters.web ? 'checked' : ''}> Web / Google</label>
          <label class="toggle"><input type="checkbox" id="useYouTube" ${state.sourceFilters.youtube ? 'checked' : ''}> YouTube</label>
          <label class="toggle"><input type="checkbox" id="useSpotify" ${state.sourceFilters.spotify ? 'checked' : ''}> Spotify pages</label>
          <label class="toggle"><input type="checkbox" id="useHashtags" ${state.sourceFilters.hashtags ? 'checked' : ''}> Hashtags / social</label>
          <label class="toggle"><input type="checkbox" id="useLinkedIn" ${state.sourceFilters.linkedin ? 'checked' : ''}> LinkedIn</label>

          <label class="toggle"><input type="checkbox" id="useReddit" ${state.sourceFilters.reddit ? 'checked' : ''}> Reddit</label>
        </div>
      </div>
    </details>

    <div class="strategy-grid">
      <div class="strategy-box">
        <div class="label">Priority executives</div>
        <div class="strategy-chips">
          ${execs.map(e => `<button type="button" class="match-chip" data-chip-type="exec" data-chip-value="${esc(e.name)}" title="${esc(e.title)}">${esc(e.name)}</button>`).join('')}
        </div>
        <div class="meta">Click an executive to launch a focused deep search and surface the best public mentions around that person.</div>
      </div>
      <div class="strategy-box">
        <div class="label">Hashtag cues</div>
        <div class="strategy-chips">
          ${hashtags.slice(0,8).map(tag => `<button type="button" class="match-chip" data-chip-type="hashtag" data-chip-value="${esc(tag)}">${esc(tag)}</button>`).join('')}
        </div>
        <div class="meta">Turns company, exec, and theme tags into broad web searches that still keep the prospecting intent tight.</div>
      </div>
      <div class="strategy-box">
        <div class="label">Trigger terms</div>
        <div class="strategy-chips">
          ${themes.map(t => `<button type="button" class="match-chip" data-chip-type="trigger" data-chip-value="${esc(t)}">${esc(t)}</button>`).join('')}
        </div>
        <div class="meta">Recent-news and public-mention signals that often indicate urgency, change, or buying motion.</div>
      </div>
    </div>

    <div class="recipe-row" id="recipeRow">
      ${buildCompanySearchPacks(account).slice(0,10).map(p => `<button type="button" class="recipe-chip" data-query="${esc(p.query)}" data-label="${esc(p.label)}" data-source="${esc(p.source)}">${esc(p.label)}</button>`).join('')}
    </div>

    <div class="results">
      <div class="results-head">
        <div>
          <div class="label">Deep search window</div>
          <div class="section-sub">Click any yellow chip, executive, or recipe. The dashboard will open a live-looking results drawer with the ranked search pack, so you always see a visible response even without API keys.</div>
        </div>
        <div class="row">
          <button class="btn ghost" id="copySearchPackBtn" type="button">Copy search pack</button>
          <button class="btn primary" id="openSearchDrawerBtn" type="button">Open results window</button>
        </div>
      </div>
      <div class="small-note">Search term: <strong>${esc(query)}</strong></div>
      <div class="query-note">${esc(searchSummaryText(account, query))}</div>
      <div class="mini-row" style="margin-top:12px">
        ${signalChips(account).map(s => `<span class="mini">${esc(s)}</span>`).join('')}
      </div>
      <div style="margin-top:14px" class="empty">The detailed result window opens on the right side of the screen after you run a search or click a chip.</div>
    </div>
  `;
}
function bindTabActions(account){
  // Executive filters
  el.tabContent.querySelectorAll('[data-exec-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      el.tabContent.querySelectorAll('[data-exec-filter]').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      const filter = btn.dataset.execFilter;
      el.tabContent.querySelectorAll('.exec').forEach(card => {
        const persona = card.dataset.persona || '';
        const show = filter === 'all' || persona.includes(filter);
        card.style.display = show ? '' : 'none';
      });
    });
  });

  el.tabContent.querySelectorAll('[data-hashtag]').forEach(btn => {
    btn.addEventListener('click', () => runDeepSearch(btn.dataset.hashtag || btn.textContent, 'hashtag'));
  });
  el.tabContent.querySelectorAll('[data-theme]').forEach(btn => {
    btn.addEventListener('click', () => runDeepSearch(btn.dataset.theme || btn.textContent, 'theme'));
  });
  el.tabContent.querySelectorAll('[data-open]').forEach(btn => {
    btn.addEventListener('click', () => {
      const query = btn.dataset.query || btn.dataset.name || account.account;
      runDeepSearch(query, btn.dataset.open || 'search');
    });
  });

  if(state.activeTab === 'podcasts'){
    const q = el.tabContent.querySelector('#podcastQuery');
    const gk = el.tabContent.querySelector('#googleKey');
    const gcx = el.tabContent.querySelector('#googleCx');
    const yk = el.tabContent.querySelector('#youtubeKey');
    const run = el.tabContent.querySelector('#runPodcastSearch');
    const save = el.tabContent.querySelector('#savePodcastKeys');
    const copyPack = el.tabContent.querySelector('#copySearchPackBtn');
    const openDraw = el.tabContent.querySelector('#openSearchDrawerBtn');

    if(q) q.addEventListener('input', () => { state.podcastQuery = q.value; persist(); });
    if(gk) gk.addEventListener('input', () => { state.googleKey = gk.value; persist(); });
    if(gcx) gcx.addEventListener('input', () => { state.googleCx = gcx.value; persist(); });
    if(yk) yk.addEventListener('input', () => { state.youtubeKey = yk.value; persist(); });

    const syncToggles = () => {
      state.sourceFilters.web = !!el.tabContent.querySelector('#useWeb')?.checked;
      state.sourceFilters.youtube = !!el.tabContent.querySelector('#useYouTube')?.checked;
      state.sourceFilters.spotify = !!el.tabContent.querySelector('#useSpotify')?.checked;
      state.sourceFilters.hashtags = !!el.tabContent.querySelector('#useHashtags')?.checked;
      state.sourceFilters.linkedin = !!el.tabContent.querySelector('#useLinkedIn')?.checked;
      state.sourceFilters.x = !!el.tabContent.querySelector('#useX')?.checked;
      state.sourceFilters.reddit = !!el.tabContent.querySelector('#useReddit')?.checked;
      persist();
    };
    ['useWeb','useYouTube','useSpotify','useHashtags','useLinkedIn','useX','useReddit'].forEach(id => {
      const checkbox = el.tabContent.querySelector('#'+id);
      if(checkbox) checkbox.addEventListener('change', syncToggles);
    });
    if(run) run.addEventListener('click', () => runDeepSearch(q ? q.value : account.account, 'manual'));
    if(save) save.addEventListener('click', () => {
      state.googleKey = gk ? gk.value.trim() : '';
      state.googleCx = gcx ? gcx.value.trim() : '';
      state.youtubeKey = yk ? yk.value.trim() : '';
      persist();
      openDrawer('Saved settings', 'Your API settings are stored locally in your browser.', buildDrawerContentFromPacks(buildCompanySearchPacks(account), q ? q.value : account.account));
    });
    if(copyPack) copyPack.addEventListener('click', () => {
      const text = buildSearchPackText(account, q ? q.value : account.account);
      copyText(text).then(ok => {
        if(ok) {
          copyPack.textContent = 'Copied!';
          setTimeout(() => copyPack.textContent = 'Copy search pack', 1200);
        }
      });
    });
    if(openDraw) openDraw.addEventListener('click', () => runDeepSearch(q ? q.value : account.account, 'manual'));
  }

  el.tabContent.querySelectorAll('[data-open="google-exec"]').forEach(btn => {
    btn.addEventListener('click', () => runDeepSearch(btn.dataset.name, 'exec'));
  });
  el.tabContent.querySelectorAll('[data-open="youtube-exec"]').forEach(btn => {
    btn.addEventListener('click', () => runDeepSearch(btn.dataset.name, 'exec'));
  });
  el.tabContent.querySelectorAll('[data-open="linkedin-exec"]').forEach(btn => {
    btn.addEventListener('click', () => runDeepSearch(btn.dataset.name, 'exec'));
  });
}
function buildSearchPackText(account, term){
  const packs = buildCompanySearchPacks(account).map(p => `${p.source} | ${p.label} | ${p.query} | ${p.why}`);
  return [`Account: ${account.account}`, `Focus term: ${term || account.account}`, ...packs].join('\n');
}
function drawerTable(packs){
  const rows = packs.map((p, idx) => `
    <tr>
      <td>${idx+1}</td>
      <td><strong>${esc(p.label)}</strong><br><span class="small-note">${esc(p.source)}</span></td>
      <td>${esc(p.query)}</td>
      <td>${esc(p.why)}</td>
      <td><a class="action primary" href="${esc(p.url)}" target="_blank" rel="noopener noreferrer">Open</a></td>
    </tr>
  `).join('');
  return `
    <div class="drawer-card">
      <div class="results-head">
        <div>
          <div class="label">Search pack</div>
          <div class="small-note">Ranked by prospecting usefulness and channel fit. These always render, even without API keys.</div>
        </div>
        <div class="score">${packs.length} searches</div>
      </div>
      <div class="results-table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>Type</th><th>Query</th><th>Why it matters</th><th>Open</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}
function drawerExecCards(account, focusName){
  const exec = rankExecs(account).find(e => e.name === focusName) || rankExecs(account)[0];
  if(!exec) return '';
  const packs = buildExecSearchPacks(account, exec);
  return `
    <div class="drawer-card">
      <div class="results-head">
        <div>
          <div class="label">Executive focus</div>
          <div class="section-sub">${esc(exec.name)} • ${esc(exec.title)}</div>
        </div>
        <div class="score">${exec.persona}</div>
      </div>
      <div class="tagrow" style="margin-bottom:10px;">
        ${signalChips(account).slice(0,6).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
      </div>
      ${drawerTable(packs)}
    </div>
  `;
}
function buildDrawerContentFromPacks(packs, term){
  return `
    <div class="drawer-grid">
      <div class="drawer-card">
        <div class="label" style="color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-size:12px">Search focus</div>
        <div class="big" style="font-size:22px;margin-top:6px">${esc(term)}</div>
        <div class="small-note" style="margin-top:8px">${esc(searchSummaryText(selectedAccount(), term))}</div>
      </div>
      ${drawerTable(packs)}
    </div>
  `;
}
function openDrawer(title, subtitle, content){
  el.drawerTitle.textContent = title;
  el.drawerSubtitle.textContent = subtitle;
  el.drawerContent.innerHTML = content;
  el.drawer.classList.add('open');
  el.drawerBackdrop.classList.add('open');
}
function closeDrawer(){
  el.drawer.classList.remove('open');
  el.drawerBackdrop.classList.remove('open');
}
function runDeepSearch(term, kind){
  const account = selectedAccount();
  state.podcastQuery = clean(term || account.account);
  persist();

  const packs = buildCompanySearchPacks(account);
  const q = state.podcastQuery || account.account;
  const qNorm = normalize(q);
  let filtered = packs.filter(p => {
    if(kind === 'exec' && p.label.toLowerCase().includes('exec')) return true;
    if(kind === 'hashtag' && p.kind === 'hashtags') return true;
    if(kind === 'theme') return p.kind === 'social' || p.kind === 'web';
    return true;
  });

  // add focused query variants on top
  const focusPacks = [
    { source:'Google', label:'Focused web', query:`"${q}" "${account.account}" podcast OR interview OR webinar`, why:'Broad web + long-form discovery.', url: googleSearchUrl(`"${q}" "${account.account}" podcast OR interview OR webinar`) },
    { source:'YouTube', label:'Focused video', query:`"${q}" ${account.account} podcast OR interview`, why:'YouTube videos, clips, and interviews.', url: youtubeSearchUrl(`"${q}" ${account.account} podcast OR interview`) },
    { source:'Spotify', label:'Focused Spotify', query:`site:open.spotify.com OR site:spotify.com "${q}" "${account.account}"`, why:'Spotify-indexed show and episode pages.', url: spotifySearchUrl(`${q} ${account.account}`) },
    { source:'Google', label:'Hashtag sweep', query:`#${slugify(q).replace(/-/g,'')} "${account.account}"`, why:'Hashtag-style search for social mentions.', url: googleSearchUrl(`#${slugify(q).replace(/-/g,'')} "${account.account}"`) }
  ];
  const combined = [...focusPacks, ...filtered].slice(0, 12);

  let subtitle = `Showing ${combined.length} ranked search paths for ${q}.`;
  let title = 'Deep search window';
  if(kind === 'exec') title = 'Executive deep search';
  if(kind === 'hashtag') title = 'Hashtag deep search';
  if(kind === 'theme') title = 'Signal deep search';

  const content = `
    <div class="drawer-grid">
      <div class="drawer-card">
        <div class="results-head">
          <div>
            <div class="label">Search focus</div>
            <div class="big" style="font-size:22px;margin-top:6px">${esc(q)}</div>
          </div>
          <div class="score">${account.account}</div>
        </div>
        <div class="small-note">${esc(searchSummaryText(account, q))}</div>
        <div class="tagrow" style="margin-top:10px;">
          ${signalChips(account).map(s => `<span class="tag">${esc(s)}</span>`).join('')}
        </div>
      </div>
      ${drawerTable(combined)}
      ${kind === 'exec' ? drawerExecCards(account, q) : ''}
    </div>
  `;
  openDrawer(title, subtitle, content);
}
function render(){
  renderSidebar();
  renderHero(selectedAccount());
  renderTabs();
  renderTabContent();
}
function bindGlobal(){
  el.accountFilter.addEventListener('input', () => {
    state.filter = el.accountFilter.value;
    renderSidebar();
  });
  el.copyShareBtn.addEventListener('click', () => {
    const url = location.href.split('#')[0] + hashState();
    copyText(url).then(ok => {
      el.copyShareBtn.textContent = ok ? 'Link copied' : 'Copy failed';
      setTimeout(() => el.copyShareBtn.textContent = 'Copy share link', 1200);
    });
  });
  el.copyBriefBtn.addEventListener('click', () => {
    const account = selectedAccount();
    const brief = [
      `Account: ${account.account}`,
      `Finance alias: ${account.finance_name || '—'}`,
      `Industry: ${account.industry || '—'}`,
      `Top execs: ${rankExecs(account).slice(0,3).map(e => `${e.name} (${e.title})`).join(' | ')}`,
      `Angle: ${recommendedAngle(account)}`,
      `Themes: ${recentThemes(account).join(', ')}`,
      `Hashtags: ${buildHashtags(account).join(' ')}`
    ].join('\n');
    copyText(brief).then(ok => {
      el.copyBriefBtn.textContent = ok ? 'Brief copied' : 'Copy failed';
      setTimeout(() => el.copyBriefBtn.textContent = 'Copy prospecting brief', 1200);
    });
  });
  el.exportJsonBtn.addEventListener('click', () => {
    const account = selectedAccount();
    const payload = {
      account,
      score: accountScore(account),
      angle: recommendedAngle(account),
      themes: recentThemes(account),
      hashtags: buildHashtags(account),
      execs: rankExecs(account).slice(0,5),
      searchPack: buildCompanySearchPacks(account).slice(0,10)
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${slugify(account.account) || 'account'}-snapshot.json`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  });
  el.drawerClose.addEventListener('click', closeDrawer);
  el.drawerBackdrop.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeDrawer(); });
  window.addEventListener('hashchange', () => {
    applyHash();
    render();
  });
}
restore();
bindGlobal();
render();
</script>
